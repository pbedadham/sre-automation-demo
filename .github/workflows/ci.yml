name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: Immutable image tag
        required: true
        default: sha-demo
      deploy_target:
        description: Deployment target
        required: true
        default: dry-run
        type: choice
        options: [dry-run, aws-ec2]
      aws_region:
        description: AWS region for EC2 deployment
        required: true
        default: us-west-2
      ami_id:
        description: Amazon Linux 2023 AMI ID for EC2 deployment
        required: false
      instance_type:
        description: EC2 instance type
        required: true
        default: t3.micro
      key_name:
        description: EC2 key pair name for Ansible SSH
        required: false
      ssh_cidr_blocks:
        description: Comma-separated SSH CIDR allowlist
        required: false
        default: 203.0.113.10/32

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pip install -r app/requirements.txt
      - run: ruff check .
      - run: pytest

  container:
    runs-on: ubuntu-latest
    needs: [python]
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'aws-ec2')
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_SHA}"
          fi
          echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: app
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'aws-ec2') }}
          tags: ${{ steps.image.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive terraform
      - run: terraform init -backend=false
        working-directory: terraform/envs/dev
      - run: terraform validate
        working-directory: terraform/envs/dev
      - run: terraform init -backend=false
        working-directory: terraform/envs/aws-dev
      - run: terraform validate
        working-directory: terraform/envs/aws-dev

  deploy-dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'dry-run'
    needs: [python, container, terraform]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: hashicorp/setup-terraform@v3
      - run: pip install -e .
      - name: Plan deployment
        run: |
          sre-deploy plan \
            --config examples/config/${{ inputs.environment }}.yaml \
            --image-tag ${{ needs.container.outputs.image_ref }} \
            --dry-run
      - name: Deploy
        run: |
          sre-deploy deploy \
            --config examples/config/${{ inputs.environment }}.yaml \
            --image-tag ${{ needs.container.outputs.image_ref }} \
            --previous-image-tag sha-previous \
            --dry-run

  deploy-aws-ec2:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'aws-ec2'
    needs: [python, container, terraform]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate EC2 inputs
        run: |
          test -n "${{ inputs.ami_id }}" || (echo "ami_id is required for aws-ec2" && exit 1)
          test -n "${{ inputs.key_name }}" || (echo "key_name is required for Ansible SSH" && exit 1)
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" || (echo "AWS_ROLE_TO_ASSUME secret is required" && exit 1)
          test -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" || (echo "EC2_SSH_PRIVATE_KEY secret is required" && exit 1)
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}
      - name: Terraform apply EC2
        working-directory: terraform/envs/aws-dev
        run: |
          cidr_args="$(printf '%s' '${{ inputs.ssh_cidr_blocks }}' | awk -F, '{
            for (i = 1; i <= NF; i++) {
              gsub(/^[ \t]+|[ \t]+$/, "", $i)
              printf "%s\"%s\"", sep, $i
              sep = ","
            }
          }')"
          terraform init
          terraform apply -auto-approve \
            -var="environment=${{ inputs.environment }}" \
            -var="region=${{ inputs.aws_region }}" \
            -var="ami_id=${{ inputs.ami_id }}" \
            -var="instance_type=${{ inputs.instance_type }}" \
            -var="key_name=${{ inputs.key_name }}" \
            -var="ssh_cidr_blocks=[${cidr_args}]"
          terraform output -raw public_ip > public_ip.txt
          terraform output -raw application_url > application_url.txt
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml
      - name: Write SSH key and inventory
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          public_ip="$(cat terraform/envs/aws-dev/public_ip.txt)"
          cat > ansible/inventory.ini <<EOF
          [orders_api]
          ec2-demo ansible_host=${public_ip} ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/ec2_key
          EOF
      - name: Deploy application with Ansible
        run: |
          ansible-playbook ansible/playbooks/deploy_app.yml \
            -e "image_ref=${{ needs.container.outputs.image_ref }}" \
            -e "environment=${{ inputs.environment }}" \
            -e "ghcr_username=${{ github.actor }}" \
            -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}"
      - name: Deployment summary
        run: |
          echo "Application URL: $(cat terraform/envs/aws-dev/application_url.txt)" >> "$GITHUB_STEP_SUMMARY"
